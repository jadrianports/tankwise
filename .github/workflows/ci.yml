name: CI

on: [push, pull_request]

# Least privilege by default; the two jobs that upload coverage widen
# this to include the id-token write needed for OIDC.
permissions:
  contents: read

jobs:
  backend-sqlite:
    name: Backend tests (SQLite)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          coverage run manage.py test
          coverage xml

      - name: Upload backend coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          use_oidc: true
          flags: backend
          files: coverage.xml

  backend-postgres:
    name: Backend tests (Postgres parity)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: tankwise
          POSTGRES_PASSWORD: tankwise
          POSTGRES_DB: tankwise
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Prod-parity job only -- the SQLite job above already owns the
      # backend Codecov flag, so this job does not upload coverage.
      - name: Run tests against Postgres
        env:
          DB_ENGINE: django.db.backends.postgresql
          DB_NAME: tankwise
          DB_USER: tankwise
          DB_PASSWORD: tankwise
          DB_HOST: localhost
          DB_PORT: '5432'
          # The service container has no TLS listener; override
          # base.py's "require" default so psycopg can connect.
          DB_SSLMODE: disable
        run: python manage.py test

  frontend:
    name: Frontend tests, typecheck, lint, build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Upload frontend coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          use_oidc: true
          flags: frontend
          files: frontend/coverage/lcov.info
