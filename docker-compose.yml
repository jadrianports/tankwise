services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    env_file:
      - path: .env
        required: false
    environment:
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: "web,localhost,127.0.0.1"
      CACHE_BACKEND: "redis"
      REDIS_URL: "redis://redis:6379/0"
      DB_NAME: "/app/data-db/db.sqlite3"
    depends_on:
      redis:
        condition: service_healthy
    # Host port 80 -> http://localhost. Remap the left-hand side (e.g.
    # "8080:80") if port 80 is already in use on the host. Carried over
    # from the retired nginx service now that serving is unified onto
    # this one container -- WhiteNoise serves the SPA + API together.
    ports:
      - "80:8000"
    # Stays on /api/health, not /api/ready -- this compose healthcheck
    # keeps its dependency-free v1.0 target; only the hosting platform's
    # own check uses /api/ready.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health', timeout=2).status == 200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - sqlite_data:/app/data-db

volumes:
  sqlite_data:
